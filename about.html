    <style>
        @font-face {
            font-family: 'OT Brut Mono';
            src: url('assets/fonts/OTBrut-RegularMono.woff2') format('woff2'),
                 url('assets/fonts/OTBrut-RegularMono.woff') format('woff');

        }

        @font-face {
            font-family: 'Acumin Variable';
            src: url('assets/fonts/AcuminVariableConcept.otf') format('opentype');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --text-primary: #e8e8e8;
            --text-secondary: #8a8a8a;
            --font-body: 'Acumin Variable', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --side-padding: 24px;
        }

        html, html * {
            cursor: none !important;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 9pt;
            line-height: 1.4;
            cursor: none !important;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a, button, input, textarea, select, [role="button"] {
            cursor: none !important;
        }

        /* ---- Custom Cursor ---- */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            will-change: transform, background-color, box-shadow;
            transition: width 0.3s cubic-bezier(0.25, 0.1, 0.25, 1),
                        height 0.3s cubic-bezier(0.25, 0.1, 0.25, 1),
                        opacity 0.2s ease;
        }

        #custom-cursor.hovering {
            width: 8px;
            height: 8px;
        }

        /* ---- Header ---- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px var(--side-padding);
        }

        .logo {
            font-family: 'OT Brut Mono', monospace;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.04em;
            color: var(--text-primary);
            text-decoration: none;
            flex-shrink: 0;
        }

        nav {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        nav a {
            font-family: var(--font-body);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0;
            transition: opacity 0.25s ease;
            white-space: nowrap;
        }

        nav a:hover {
            opacity: 0.6;
        }

        /* ---- About Content ---- */
        .about-content {
            flex: 1;
            padding: 80px var(--side-padding) 300px;
            max-width: 1200px;
            position: relative;
        }

        .about-text {
            font-family: 'OT Brut Mono', monospace;
            font-size: clamp(28px, 4vw, 48px);
            font-weight: 400;
            line-height: 1.25;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .about-text .paragraph {
            margin-bottom: 1em;
        }

        .about-text .char {
            display: inline-block;
            position: relative;
            transition: none;
            white-space: pre;
        }

        .about-text .char.falling {
            position: fixed;
            z-index: 500;
            pointer-events: none;
        }

        .about-text .char.fallen-placeholder {
            visibility: hidden;
        }

        .about-text .word {
            display: inline-block;
            white-space: nowrap;
        }

        /* ---- Footer ---- */
        footer {
            margin-top: auto;
            padding: 0 var(--side-padding) 40px;
            position: relative;
            z-index: 600;
        }

        .footer-line {
            width: 100%;
            height: 1px;
            background-color: #ffffff;

        .footer-content {

            justify-content: space-between;
            align-items: flex-start;

        .footer-right {

        .footer-right a {
            font-family: var(--font-body);
            font-size: 13px;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 0;
            transition: opacity 0.25s ease;
        }

        .footer-right a:hover {
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            :root {

            }
            header {
                flex-direction: column;

                gap: 16px;
            }
            nav {
                gap: 24px;
            }
        }

    <script>
        // ---- Custom Cursor (same as index) ----
        const cursor = document.getElementById('custom-cursor');
        let mouseX = -100, mouseY = -100;
        let cursorX = -100, cursorY = -100;
        let isHovering = false;
        let currentSize = 16;

        const colorStops = [
            { h: 48,  s: 65, l: 72 },
            { h: 30,  s: 60, l: 70 },
            { h: 12,  s: 58, l: 72 },
            { h: 355, s: 55, l: 74 },
            { h: 340, s: 50, l: 72 },
            { h: 320, s: 48, l: 70 },
            { h: 290, s: 40, l: 72 },
            { h: 200, s: 50, l: 72 },
            { h: 180, s: 42, l: 68 },
            { h: 155, s: 40, l: 68 },
            { h: 130, s: 38, l: 70 },
            { h: 22,  s: 40, l: 62 },
            { h: 14,  s: 45, l: 68 },
            { h: 48,  s: 65, l: 72 },
        ];

        function catmullRom(p0, p1, p2, p3, t) {
            const t2 = t * t;
            const t3 = t2 * t;
            return 0.5 * ((2 * p1) + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 + (-p0 + 3 * p1 - 3 * p2 + p3) * t3);
        }

        function unwrapHue(val, ref) {
            let diff = val - ref;
            if (diff > 180) return val - 360;
            if (diff < -180) return val + 360;
            return val;
        }

        function getColor(t) {
            const segCount = colorStops.length - 1;
            const scaledT = t * segCount;
            const i = Math.floor(scaledT);
            const frac = scaledT - i;
            const i0 = (i - 1 + segCount) % segCount;
            const i1 = i % segCount;
            const i2 = (i + 1) % segCount;
            const i3 = (i + 2) % segCount;
            const p0 = colorStops[i0], p1 = colorStops[i1], p2 = colorStops[i2], p3 = colorStops[i3];
            const h0 = unwrapHue(p0.h, p1.h), h1 = p1.h, h2 = unwrapHue(p2.h, p1.h), h3 = unwrapHue(p3.h, p1.h);
            let h = catmullRom(h0, h1, h2, h3, frac);
            const s = catmullRom(p0.s, p1.s, p2.s, p3.s, frac);
            const l = catmullRom(p0.l, p1.l, p2.l, p3.l, frac);
            h = ((h % 360) + 360) % 360;
            return `hsl(${h.toFixed(1)}, ${Math.max(0, Math.min(100, s)).toFixed(1)}%, ${Math.max(0, Math.min(100, l)).toFixed(1)}%)`;
        }

        let colorTime = 0;
        const colorSpeed = 0.000295;

        function getGlowColor(t) {
            const segCount = colorStops.length - 1;
            const scaledT = t * segCount;
            const i = Math.floor(scaledT);
            const frac = scaledT - i;
            const i0 = (i - 1 + segCount) % segCount;
            const i1 = i % segCount;
            const i2 = (i + 1) % segCount;
            const i3 = (i + 2) % segCount;
            const p0 = colorStops[i0], p1 = colorStops[i1], p2 = colorStops[i2], p3 = colorStops[i3];
            const h0 = unwrapHue(p0.h, p1.h), h1 = p1.h, h2 = unwrapHue(p2.h, p1.h), h3 = unwrapHue(p3.h, p1.h);
            let h = catmullRom(h0, h1, h2, h3, frac);
            const s = catmullRom(p0.s, p1.s, p2.s, p3.s, frac);
            const l = catmullRom(p0.l, p1.l, p2.l, p3.l, frac);
            h = ((h % 360) + 360) % 360;
            return `hsla(${h.toFixed(1)}, ${Math.max(0, Math.min(100, s)).toFixed(1)}%, ${Math.max(0, Math.min(100, l)).toFixed(1)}%, 0.15)`;
        }

        let cursorActive = false;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (!cursorActive) {
                cursorActive = true;
                cursorX = mouseX;
                cursorY = mouseY;
                cursor.style.opacity = '1';
            }
        });

        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('a, button, [role="button"]')) {
                isHovering = true;
                cursor.classList.add('hovering');
            }
        });

        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('a, button, [role="button"]')) {
                isHovering = false;
                cursor.classList.remove('hovering');
            }
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.18;
            cursorY += (mouseY - cursorY) * 0.18;
            const targetSize = isHovering ? 8 : 16;
            currentSize += (targetSize - currentSize) * 0.12;
            const half = currentSize / 2;
            cursor.style.transform = `translate(${cursorX - half}px, ${cursorY - half}px)`;
            colorTime += colorSpeed;
            if (colorTime > 1) colorTime -= 1;
            cursor.style.backgroundColor = getColor(colorTime);
            cursor.style.boxShadow = `0 0 12px 2px ${getGlowColor(colorTime)}`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
        document.addEventListener('mouseleave', () => { cursor.style.opacity = '0'; });
        document.addEventListener('mouseenter', () => { if (cursorActive) cursor.style.opacity = '1'; });

        // ---- Letter Physics with Matter.js ----
        const { Engine, World, Bodies, Body, Events, Mouse, Constraint } = Matter;

        const engine = Engine.create({ gravity: { x: 0, y: 1.8 } });
        const world = engine.world;

        // Cursor as a physics body — pushes fallen letters
        const cursorBody = Bodies.circle(-100, -100, 30, {
            isStatic: true,
            restitution: 0.8,
            friction: 0.1,
        });
        World.add(world, cursorBody);

        // Update cursor body position on mousemove
        document.addEventListener('mousemove', (e) => {
            Body.setPosition(cursorBody, {
                x: e.clientX,
                y: e.clientY + window.scrollY
            });
        });

        // Floor — positioned just above the footer line
        let floorBody;
        const wallThickness = 60;
        let leftWall, rightWall;

        function createBoundaries() {
            const footerLine = document.getElementById('footer-line');
            const footerRect = footerLine.getBoundingClientRect();
            const floorY = footerRect.top + window.scrollY;

            if (floorBody) World.remove(world, floorBody);
            if (leftWall) World.remove(world, leftWall);
            if (rightWall) World.remove(world, rightWall);

            floorBody = Bodies.rectangle(
                window.innerWidth / 2, floorY + wallThickness / 2,
                window.innerWidth * 2, wallThickness,
                { isStatic: true, restitution: 0.3, friction: 0.8 }
            );
            leftWall = Bodies.rectangle(
                -wallThickness / 2, floorY / 2,
                wallThickness, floorY * 2,
                { isStatic: true, restitution: 0.2, friction: 0.5 }
            );
            rightWall = Bodies.rectangle(
                window.innerWidth + wallThickness / 2, floorY / 2,
                wallThickness, floorY * 2,
                { isStatic: true, restitution: 0.2, friction: 0.5 }
            );

            World.add(world, [floorBody, leftWall, rightWall]);
        }

        // Split text into individual character spans
        const paragraphs = document.querySelectorAll('.paragraph');
        const allChars = [];

        paragraphs.forEach(p => {
            const text = p.getAttribute('data-text');
            const words = text.split(' ');

            words.forEach((word, wi) => {
                const wordSpan = document.createElement('span');
                wordSpan.className = 'word';

                for (let ci = 0; ci < word.length; ci++) {
                    const charSpan = document.createElement('span');
                    charSpan.className = 'char';
                    charSpan.textContent = word[ci];
                    charSpan.dataset.fallen = 'false';
                    wordSpan.appendChild(charSpan);
                    allChars.push(charSpan);
                }

                p.appendChild(wordSpan);

                // Add space between words
                if (wi < words.length - 1) {
                    const spaceSpan = document.createElement('span');
                    spaceSpan.className = 'char';
                    spaceSpan.innerHTML = '&nbsp;';
                    spaceSpan.dataset.fallen = 'false';
                    p.appendChild(spaceSpan);
                    allChars.push(spaceSpan);
                }
            });
        });

        // Random bright color — always readable against black
        function randomBrightColor() {
            const h = Math.random() * 360;
            const s = 50 + Math.random() * 40;  // 50-90%
            const l = 60 + Math.random() * 25;  // 60-85%
            return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`;
        }

        // Track falling letters
        const fallingLetters = [];
        const bodyToItem = new Map();

        function dropChar(charEl) {
            if (charEl.dataset.fallen === 'true') return;
            charEl.dataset.fallen = 'true';

            const rect = charEl.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            const w = rect.width;
            const h = rect.height;

            if (w === 0 || h === 0) return;

            // Create physics body
            const body = Bodies.rectangle(x, y + window.scrollY, w, h, {
                restitution: 0.35,
                friction: 0.6,
                frictionAir: 0.01,
                density: 0.002,
                angle: (Math.random() - 0.5) * 0.15,
            });

            // Give a slight random horizontal impulse
            Body.setVelocity(body, {
                x: (Math.random() - 0.5) * 2,
                y: 0
            });

            World.add(world, body);

            // Make the DOM element fixed and track it
            charEl.classList.add('falling');
            charEl.style.width = w + 'px';
            charEl.style.height = h + 'px';
            charEl.style.lineHeight = h + 'px';
            charEl.style.textAlign = 'center';

            // Assign random color on drop
            charEl.style.color = randomBrightColor();

            // Create invisible placeholder to keep layout
            const placeholder = document.createElement('span');
            placeholder.className = 'char fallen-placeholder';
            placeholder.style.width = w + 'px';
            placeholder.style.display = 'inline-block';
            placeholder.innerHTML = '&nbsp;';
            charEl.parentNode.insertBefore(placeholder, charEl);

            const item = { el: charEl, body, w, h };
            fallingLetters.push(item);
            bodyToItem.set(body.id, item);
        }

        // Change color on collision
        Events.on(engine, 'collisionStart', (event) => {
            for (const pair of event.pairs) {
                const itemA = bodyToItem.get(pair.bodyA.id);
                const itemB = bodyToItem.get(pair.bodyB.id);
                if (itemA) itemA.el.style.color = randomBrightColor();
                if (itemB) itemB.el.style.color = randomBrightColor();
            }
        });

        // Hover detection — drop chars the cursor touches
        allChars.forEach(charEl => {
            charEl.addEventListener('mouseenter', () => {
                dropChar(charEl);
            });
        });

        // Physics loop
        let lastTime = performance.now();

        function physicsLoop() {
            const now = performance.now();
            const delta = Math.min(now - lastTime, 32);
            lastTime = now;

            Engine.update(engine, delta);

            const scrollY = window.scrollY;

            for (const item of fallingLetters) {
                const { el, body, w, h } = item;
                const bx = body.position.x - w / 2;
                const by = body.position.y - h / 2 - scrollY;
                const angle = body.angle;
                el.style.left = '0px';
                el.style.top = '0px';
                el.style.transform = `translate(${bx}px, ${by}px) rotate(${angle}rad)`;
            }

            requestAnimationFrame(physicsLoop);
        }

        // Initialize
        window.addEventListener('load', () => {
            createBoundaries();
            physicsLoop();
        });

        window.addEventListener('resize', createBoundaries);
    </script>
